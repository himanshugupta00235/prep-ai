name: prep_ai
description: AI-Powered Interview Preparation Application built with Flutter, Firebase, and MVVM architecture.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.1.2

  # Firebase
  firebase_core: ^4.11.0
  firebase_auth: ^6.5.3
  cloud_firestore: ^6.6.0

  # Local Storage
  shared_preferences: ^2.5.0

  # Networking
  http: ^1.3.0

  # Routing
  go_router: ^15.0.0

  # UI
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.17

  # Utilities
  intl: ^0.20.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
